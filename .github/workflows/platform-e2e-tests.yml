name: Platform E2E Tests

# Runs automatically in merge queue as the required E2E gate.
# For PRs, add the "run-e2e" label to trigger the full E2E suite on demand.
# New commits to labeled PRs re-run E2E automatically.
on:
  workflow_dispatch:
  pull_request:
    types:
      - labeled
      - synchronize
  merge_group:

permissions: {}

concurrency:
  group: "platform-e2e-tests-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}"
  cancel-in-progress: true

jobs:
  platform-e2e-tests:
    name: Platform E2E Tests
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group' || (github.event_name == 'pull_request' && (github.event.label.name == 'run-e2e' || contains(github.event.pull_request.labels.*.name, 'run-e2e'))) }}
    permissions:
      contents: write # Required for release-please codegen commits and checked-in report artifacts.
      security-events: write # Required for Docker Scout SARIF uploads.
      id-token: write # Required for Workload Identity Federation.
      pull-requests: write # Required for Docker Scout to write a comment to a PR.
    uses: ./.github/workflows/platform-linting-and-tests.yml
    with:
      should-skip-running-and-always-succeed: false
      is-fork-pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true }}
    secrets:
      TURBOREPO_REMOTE_CACHING_TOKEN: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}
      TURBOREPO_REMOTE_CACHING_TEAM: ${{ secrets.TURBOREPO_REMOTE_CACHING_TEAM }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      GCP_SERVICE_ACCOUNT_NAME: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
      GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}
