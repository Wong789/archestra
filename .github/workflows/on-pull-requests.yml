name: On Pull Requests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

concurrency:
  group: "on-pull-requests-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  release-freeze-check:
    name: Release Freeze Check
    # Always run so it can be a required status check - passes immediately for non-release-please PRs.
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read # Required to inspect the repository context for release-please PRs.
      pull-requests: write # Required to request changes on frozen release PRs.
    steps:
      - name: Check if this requires freeze validation
        id: check-context
        run: |
          if [[ "$HEAD_REF" == release-please--* ]]; then
            echo "should_check=true" >> "$GITHUB_OUTPUT"
            echo "🔖 This is a release-please PR - checking freeze status"
          else
            echo "should_check=false" >> "$GITHUB_OUTPUT"
            echo "✅ Not a release-please PR - passing automatically"
          fi
        env:
          HEAD_REF: ${{ github.head_ref }}

      - name: Check if release is frozen
        id: check-freeze
        if: steps.check-context.outputs.should_check == 'true'
        env:
          RELEASE_FREEZE: ${{ vars.RELEASE_FREEZE }}
        run: |
          if [ "$RELEASE_FREEZE" = "true" ]; then
            echo "frozen=true" >> "$GITHUB_OUTPUT"
            echo "❄️ Release freeze is active"
          else
            echo "frozen=false" >> "$GITHUB_OUTPUT"
            echo "✅ No release freeze active. Release-please PR can proceed."
          fi

      - name: Checkout repository
        if: steps.check-context.outputs.should_check == 'true' && steps.check-freeze.outputs.frozen == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Request changes on PR
        if: steps.check-context.outputs.should_check == 'true' && steps.check-freeze.outputs.frozen == 'true'
        uses: ./.github/actions/release-freeze-review
        with:
          action: freeze
          app-id: ${{ secrets.ARCHESTRA_RELEASE_FREEZE_CHECKER_GITHUB_APP_ID }}
          private-key: ${{ secrets.ARCHESTRA_RELEASE_FREEZE_CHECKER_GITHUB_APP_PRIVATE_KEY }}
          pr-number: ${{ github.event.pull_request.number }}

      - name: Fail if frozen
        if: steps.check-context.outputs.should_check == 'true' && steps.check-freeze.outputs.frozen == 'true'
        run: |
          echo "::error::❄️ Release freeze is active. Merging release-please PRs is blocked."
          exit 1

  license-compliance-check:
    name: License Compliance Check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./platform
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Run license compliance check
        run: pnpm license-check --ci

      - name: Generate full license report (on failure)
        if: failure()
        run: |
          echo "## License Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "❌ License check failed. See details below:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm license-check 2>&1 | head -100 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Add success summary
        if: success()
        run: |
          echo "## ✅ License Compliance Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No GPL/AGPL/Unknown licenses found in dependencies." >> $GITHUB_STEP_SUMMARY

  supply-chain-policy:
    name: Supply Chain Policy
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Enforce image pinning and download verification policy
        run: python3 .github/scripts/check-supply-chain-policy.py

  dependency-review:
    name: Dependency Review
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read # Required to checkout the repository and diff dependency manifests.
      pull-requests: write # Required for dependency-review-action PR comments.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          # NOTE: disable license check here because we are already doing it in the license-compliance-check job
          # allow-licenses: MIT
          license-check: false
          comment-summary-in-pr: on-failure

  # Fast feedback on every PR push: lint + typecheck + unit tests.
  # Full E2E runs in the separate "Platform E2E Tests" workflow on merge queue
  # or on-demand via the "run-e2e" PR label.
  platform-lint-and-unit-tests:
    name: Platform Lint and Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./platform
    steps:
      - name: Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Type checking, linting, formatting, unit tests
        run: pnpm check:ci

      - name: Run validation checks (drizzle-kit, codegen, db migrations)
        run: |
          set -e

          # Start drizzle-kit check in background
          echo "Starting drizzle-kit check in background..."
          (cd backend && pnpm drizzle-kit check) &
          DRIZZLE_PID=$!

          # Run codegen and lint
          echo "Running codegen..."
          pnpm codegen
          pnpm lint:fix

          # Check for codegen changes
          if ! git diff --exit-code || ! git diff --cached --exit-code; then
            echo "::error::Codegen produced changes. Please run 'pnpm codegen && pnpm lint:fix' locally and commit the results."
            git diff --stat
            exit 1
          fi

          # Wait for drizzle-kit check
          echo "Waiting for drizzle-kit check..."
          wait $DRIZZLE_PID

          # Generate migrations and ensure no new migrations are created
          echo "Checking for missing database migrations..."
          pnpm db:generate

          if ! git diff --exit-code -- backend/src/database/migrations/ || ! git diff --cached --exit-code -- backend/src/database/migrations/; then
            echo "::error::Database schema changes require a migration. Please run 'pnpm db:generate' locally and commit the generated migration."
            git diff --stat backend/src/database/migrations/
            exit 1
          fi

          echo "✅ All validation checks passed"

  helm-chart-linting-and-tests:
    name: Helm Chart Linting and Tests
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read # Required to checkout the repository and lint/package the Helm chart.
    defaults:
      run:
        working-directory: ./platform/helm/archestra
    steps:
      - name: Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Linting
        run: helm lint .

      - name: Tests
        run: |
          HELM_UNITTEST_VERSION="1.0.3"
          HELM_UNITTEST_ARCHIVE="helm-unittest-linux-amd64-${HELM_UNITTEST_VERSION}.tgz"
          HELM_UNITTEST_BASE_URL="https://github.com/helm-unittest/helm-unittest/releases/download/v${HELM_UNITTEST_VERSION}"
          curl -fsSL -o /tmp/helm-unittest-checksum.sha "${HELM_UNITTEST_BASE_URL}/helm-unittest-checksum.sha"
          curl -fsSL -o "/tmp/${HELM_UNITTEST_ARCHIVE}" "${HELM_UNITTEST_BASE_URL}/${HELM_UNITTEST_ARCHIVE}"
          (
            cd /tmp
            awk -v archive="${HELM_UNITTEST_ARCHIVE}" '
              $2 ~ ("/" archive "$") {
                print $1 " *" archive
              }
            ' helm-unittest-checksum.sha | sha256sum -c -
          )
          HELM_UNITTEST_EXTRACT_DIR="$(mktemp -d)"
          HELM_PLUGINS_DIR="$(helm env HELM_PLUGINS)"
          mkdir -p "${HELM_PLUGINS_DIR}/unittest"
          tar -xzf "/tmp/${HELM_UNITTEST_ARCHIVE}" -C "${HELM_UNITTEST_EXTRACT_DIR}"
          cp -R "${HELM_UNITTEST_EXTRACT_DIR}/." "${HELM_PLUGINS_DIR}/unittest"
          helm unittest .

      - name: helm package
        # NOTE: can't use ${{ github.sha }} for version here because it's not a valid version number
        # and helm package explicitly checks this.
        run: |
          helm package . --version v0.0.1 --app-version v0.0.1
