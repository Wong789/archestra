name: Nightly Cross-Browser E2E Tests

# Runs Firefox and WebKit e2e tests on a nightly schedule.
# These were moved out of PR/merge-queue CI to save ~10-15 min of wall time
# (2 fewer 16-vCPU Kind clusters per CI run for ~7 cross-browser tests).

on:
  schedule:
    # Run at 3:00 AM UTC every weekday (Mon-Fri)
    - cron: "0 3 * * 1-5"
  workflow_dispatch: # Allow manual triggers

env:
  PLATFORM_IMAGE_REGISTRY: europe-west1-docker.pkg.dev/friendly-path-465518-r6/archestra-public
  PLATFORM_IMAGE_NAME: platform
  MCP_SERVER_BASE_IMAGE_REGISTRY: europe-west1-docker.pkg.dev/friendly-path-465518-r6/archestra-public
  MCP_SERVER_BASE_IMAGE_NAME: mcp-server-base

jobs:
  build:
    name: Build Platform Image
    runs-on: blacksmith-16vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Authenticate to Google Artifact Registry
        uses: ./.github/actions/auth-to-gar
        with:
          service_account: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
          workload_identity_provider: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

      - name: Build platform Docker image
        uses: ./.github/actions/build-platform-docker-image
        with:
          load: true
          image-tag: archestra-platform:${{ github.sha }}
          turbo-token: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}
          turbo-team: ${{ secrets.TURBOREPO_REMOTE_CACHING_TEAM }}

      - name: Export Docker image as tarball
        run: |
          docker save "archestra-platform:${{ github.sha }}" | gzip > /tmp/platform-image.tar.gz
          ls -lh /tmp/platform-image.tar.gz

      - name: Upload Docker image artifact
        uses: ./.github/actions/github-upload-artifact
        with:
          name: nightly-platform-docker-image
          path: /tmp/platform-image.tar.gz
          retention-days: 1
          compression-level: 0

  cross-browser-tests:
    name: Cross-Browser E2E (${{ matrix.name }})
    needs: [build]
    runs-on: blacksmith-16vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Firefox
            projects: firefox
            extra_args: "--grep '@firefox' --workers=1"
            artifact: blob-report-nightly-firefox
          - name: WebKit
            projects: webkit
            extra_args: "--grep '@webkit' --workers=1"
            artifact: blob-report-nightly-webkit
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Load platform image
        id: load-platform-image
        uses: ./.github/actions/load-platform-image
        with:
          source: artifact
          image-tag: archestra-platform:${{ github.sha }}
          artifact-name: nightly-platform-docker-image

      - name: Load MCP server base image
        id: load-mcp-server-base-image
        uses: ./.github/actions/load-mcp-server-base-image
        with:
          source: registry
          image-tag: ${{ env.MCP_SERVER_BASE_IMAGE_REGISTRY }}/${{ env.MCP_SERVER_BASE_IMAGE_NAME }}:latest

      - name: Setup Archestra Platform
        uses: ./.github/actions/setup-archestra-platform
        with:
          kind-config-path: .github/kind.yaml
          kind-cluster-name: archestra-ci-cluster
          helm-values-path: .github/values-ci.yaml
          deploy-e2e-dependencies: "true"
          build-platform-image: "false"
          platform-image-tag: ${{ steps.load-platform-image.outputs.image-tag }}
          platform-context: ./platform
          mcp-server-base-image-tag: ${{ steps.load-mcp-server-base-image.outputs.image-tag }}

      - name: Run E2E tests
        id: e2e
        uses: ./.github/actions/run-e2e-tests
        with:
          projects: ${{ matrix.projects }}
          extra_args: ${{ matrix.extra_args }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: ./.github/actions/github-upload-artifact
        with:
          name: ${{ matrix.artifact }}
          path: platform/e2e-tests/blob-report/
          retention-days: 1

      - name: Show logs on failure
        if: ${{ failure() }}
        working-directory: ./platform
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -A
          echo "=== Services ==="
          kubectl get svc -A
          echo "=== Application Logs ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform --tail=100 --all-containers || true
